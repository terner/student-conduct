<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2200" viewBox="0 0 1600 2200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.52" stop-color="#f3f7f1"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .font { font-family: "Noto Sans Thai", "Th Sarabun New", "Sarabun", "Arial", sans-serif; }
      .h1 { font-size: 86px; font-weight: 800; letter-spacing: 0; fill: #0f172a; }
      .h2 { font-size: 44px; font-weight: 800; fill: #0f172a; }
      .sub { font-size: 34px; font-weight: 500; fill: #475569; }
      .label { font-size: 28px; font-weight: 800; fill: #0f172a; }
      .body { font-size: 25px; font-weight: 500; fill: #334155; }
      .small { font-size: 22px; font-weight: 600; fill: #64748b; }
      .chip { font-size: 22px; font-weight: 800; fill: #0f172a; }
      .card { fill: rgba(255,255,255,0.88); stroke: #d8e0e9; stroke-width: 2; rx: 24; filter: url(#softShadow); }
      .line { stroke: #d8e0e9; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1600" height="2200" fill="url(#bg)"/>

  <rect x="95" y="86" width="1410" height="260" rx="34" fill="#ffffff" stroke="#dbe7f0" stroke-width="2" filter="url(#softShadow)"/>
  <rect x="120" y="112" width="180" height="180" rx="32" fill="url(#title)"/>
  <path d="M176 238h68v-70h-68v70Zm14-14v-42h40v42h-40Zm70 14h28v-92h-28v92Zm-102 24h148v22H158v-22Z" fill="#ffffff"/>
  <text class="font h1" x="335" y="184">ระบบคะแนนความประพฤตินักเรียน</text>
  <text class="font sub" x="338" y="238">School Conduct Management System</text>
  <text class="font small" x="338" y="286">จัดการข้อมูลนักเรียน บันทึกคะแนน ติดตามความเสี่ยง รายงาน และงานบริหารโรงเรียนในระบบเดียว</text>

  <g transform="translate(96 390)">
    <rect class="card" width="450" height="310"/>
    <circle cx="62" cy="66" r="34" fill="#dbeafe"/>
    <text class="font h2" x="112" y="82">แดชบอร์ดผู้บริหาร</text>
    <line class="line" x1="32" y1="112" x2="418" y2="112"/>
    <text class="font body" x="34" y="158">• สรุปจำนวนนักเรียน ห้องเรียน ครู</text>
    <text class="font body" x="34" y="198">• คะแนนเฉลี่ยและรายการล่าสุด</text>
    <text class="font body" x="34" y="238">• นักเรียนกลุ่มเสี่ยงและแจ้งเตือน</text>
    <text class="font body" x="34" y="278">• รีเฟรชข้อมูลและ realtime updates</text>
  </g>

  <g transform="translate(575 390)">
    <rect class="card" width="450" height="310"/>
    <circle cx="62" cy="66" r="34" fill="#dcfce7"/>
    <text class="font h2" x="112" y="82">จัดการนักเรียน</text>
    <line class="line" x1="32" y1="112" x2="418" y2="112"/>
    <text class="font body" x="34" y="158">• รายชื่อนักเรียนแบบแบ่งหน้า</text>
    <text class="font body" x="34" y="198">• ค้นหา กรองห้อง/ระดับ/ปีการศึกษา</text>
    <text class="font body" x="34" y="238">• โปรไฟล์ ผู้ปกครอง เลขที่ในห้อง</text>
    <text class="font body" x="34" y="278">• เพิ่ม แก้ไข ลบ และส่งออก CSV</text>
  </g>

  <g transform="translate(1054 390)">
    <rect class="card" width="450" height="310"/>
    <circle cx="62" cy="66" r="34" fill="#ffedd5"/>
    <text class="font h2" x="112" y="82">ห้องเรียนและครู</text>
    <line class="line" x1="32" y1="112" x2="418" y2="112"/>
    <text class="font body" x="34" y="158">• จัดการห้องเรียนตามปีการศึกษา</text>
    <text class="font body" x="34" y="198">• ระดับชั้น/ช่วงชั้น/เลขห้อง</text>
    <text class="font body" x="34" y="238">• รายชื่อครูและตำแหน่งครู</text>
    <text class="font body" x="34" y="278">• มอบหมายครูประจำชั้น/ผู้ช่วย</text>
  </g>

  <g transform="translate(96 740)">
    <rect class="card" width="450" height="330"/>
    <circle cx="62" cy="66" r="34" fill="#fee2e2"/>
    <text class="font h2" x="112" y="82">บันทึกคะแนน</text>
    <line class="line" x1="32" y1="112" x2="418" y2="112"/>
    <text class="font body" x="34" y="158">• เพิ่ม/ตัดคะแนนความประพฤติ</text>
    <text class="font body" x="34" y="198">• บันทึกแบบรายคนหรือหลายคน</text>
    <text class="font body" x="34" y="238">• แนบหลักฐานรูปภาพ/ไฟล์</text>
    <text class="font body" x="34" y="278">• หมวดคะแนนและเหตุผลรายการ</text>
    <text class="font body" x="34" y="318">• เปิดใช้เฉพาะปีการศึกษาปัจจุบัน</text>
  </g>

  <g transform="translate(575 740)">
    <rect class="card" width="450" height="330"/>
    <circle cx="62" cy="66" r="34" fill="#ede9fe"/>
    <text class="font h2" x="112" y="82">อนุมัติและประวัติ</text>
    <line class="line" x1="32" y1="112" x2="418" y2="112"/>
    <text class="font body" x="34" y="158">• รายการรออนุมัติจากครู</text>
    <text class="font body" x="34" y="198">• อนุมัติหรือยกเลิกพร้อมเหตุผล</text>
    <text class="font body" x="34" y="238">• ประวัติคะแนนย้อนหลัง</text>
    <text class="font body" x="34" y="278">• ค้นหา/กรองตามนักเรียนและวันที่</text>
    <text class="font body" x="34" y="318">• สถานะ pending / approved / voided</text>
  </g>

  <g transform="translate(1054 740)">
    <rect class="card" width="450" height="330"/>
    <circle cx="62" cy="66" r="34" fill="#cffafe"/>
    <text class="font h2" x="112" y="82">รายงานและสถิติ</text>
    <line class="line" x1="32" y1="112" x2="418" y2="112"/>
    <text class="font body" x="34" y="158">• รายงานรายบุคคลและอันดับ</text>
    <text class="font body" x="34" y="198">• รายงานห้องเรียนสำหรับครู</text>
    <text class="font body" x="34" y="238">• นักเรียนถึงเกณฑ์เฝ้าระวัง</text>
    <text class="font body" x="34" y="278">• สถิติคะแนนและภาพรวมโรงเรียน</text>
    <text class="font body" x="34" y="318">• เอกสารทัณฑ์บน/รายงานเสริม</text>
  </g>

  <g transform="translate(96 1110)">
    <rect class="card" width="450" height="330"/>
    <circle cx="62" cy="66" r="34" fill="#fef9c3"/>
    <text class="font h2" x="112" y="82">นำเข้าและปีการศึกษา</text>
    <line class="line" x1="32" y1="112" x2="418" y2="112"/>
    <text class="font body" x="34" y="158">• นำเข้าข้อมูลนักเรียน CSV</text>
    <text class="font body" x="34" y="198">• โอนย้าย/เลื่อนชั้นตามปีการศึกษา</text>
    <text class="font body" x="34" y="238">• จัดการปีการศึกษาและสถานะปัจจุบัน</text>
    <text class="font body" x="34" y="278">• จัดการระดับชั้นและช่วงชั้น</text>
    <text class="font body" x="34" y="318">• ป้องกันเลขนักเรียนซ้ำในปีเดียวกัน</text>
  </g>

  <g transform="translate(575 1110)">
    <rect class="card" width="450" height="330"/>
    <circle cx="62" cy="66" r="34" fill="#e0f2fe"/>
    <text class="font h2" x="112" y="82">บัญชีและความปลอดภัย</text>
    <line class="line" x1="32" y1="112" x2="418" y2="112"/>
    <text class="font body" x="34" y="158">• บทบาท superadmin / admin / teacher / student</text>
    <text class="font body" x="34" y="198">• สิทธิ์เมนูตามบทบาทผู้ใช้</text>
    <text class="font body" x="34" y="238">• บังคับเปลี่ยนรหัสผ่านครั้งแรก</text>
    <text class="font body" x="34" y="278">• PDPA consent ก่อนเข้าใช้งาน</text>
    <text class="font body" x="34" y="318">• Audit log และ action log</text>
  </g>

  <g transform="translate(1054 1110)">
    <rect class="card" width="450" height="330"/>
    <circle cx="62" cy="66" r="34" fill="#fce7f3"/>
    <text class="font h2" x="112" y="82">ระบบนักเรียน</text>
    <line class="line" x1="32" y1="112" x2="418" y2="112"/>
    <text class="font body" x="34" y="158">• นักเรียนดูคะแนนของตนเอง</text>
    <text class="font body" x="34" y="198">• ดูประวัติคะแนนและหลักฐาน</text>
    <text class="font body" x="34" y="238">• ข้อมูลชั้นเรียนและโปรไฟล์</text>
    <text class="font body" x="34" y="278">• จำกัดการเข้าถึงเฉพาะข้อมูลตนเอง</text>
    <text class="font body" x="34" y="318">• รองรับการแจ้งเตือนที่เกี่ยวข้อง</text>
  </g>

  <g transform="translate(96 1480)">
    <rect class="card" width="688" height="300"/>
    <text class="font h2" x="42" y="70">การตั้งค่าระบบ</text>
    <line class="line" x1="42" y1="100" x2="646" y2="100"/>
    <text class="font body" x="44" y="148">• ข้อมูลโรงเรียน โลโก้ คะแนนตั้งต้น และเกณฑ์แจ้งเตือน</text>
    <text class="font body" x="44" y="190">• ทดสอบ Email / Storage และตั้งค่าการเก็บหลักฐาน</text>
    <text class="font body" x="44" y="232">• จัดการหมวดคะแนน ตำแหน่งครู ระดับชั้น และคู่มือระบบ</text>
    <text class="font body" x="44" y="274">• บันทึกการใช้งานเพื่อการตรวจสอบย้อนหลัง</text>
  </g>

  <g transform="translate(816 1480)">
    <rect class="card" width="688" height="300"/>
    <text class="font h2" x="42" y="70">Workflow หลัก</text>
    <line class="line" x1="42" y1="100" x2="646" y2="100"/>
    <text class="font body" x="44" y="148">1. ตั้งปีการศึกษา ห้องเรียน และข้อมูลนักเรียน</text>
    <text class="font body" x="44" y="190">2. ครูบันทึกคะแนนพร้อมหลักฐานตามหมวดความประพฤติ</text>
    <text class="font body" x="44" y="232">3. ผู้ดูแลอนุมัติ ติดตามนักเรียนถึงเกณฑ์ และออกรายงาน</text>
    <text class="font body" x="44" y="274">4. นักเรียนตรวจสอบคะแนนของตนเองผ่านระบบ</text>
  </g>

  <g transform="translate(96 1830)">
    <rect width="1408" height="210" rx="30" fill="#0f172a" filter="url(#softShadow)"/>
    <text class="font h2" x="48" y="74" fill="#ffffff">เหมาะสำหรับ</text>
    <text class="font body" x="48" y="128" fill="#e2e8f0">ฝ่ายปกครอง ครูประจำชั้น ผู้บริหาร และนักเรียน ที่ต้องการระบบติดตามคะแนนความประพฤติแบบครบวงจร</text>
    <g transform="translate(48 152)">
      <rect width="210" height="40" rx="20" fill="#14b8a6"/>
      <text class="font chip" x="28" y="27">Role-based access</text>
      <rect x="230" width="180" height="40" rx="20" fill="#60a5fa"/>
      <text class="font chip" x="258" y="27">Reports</text>
      <rect x="430" width="190" height="40" rx="20" fill="#f59e0b"/>
      <text class="font chip" x="458" y="27">Evidence</text>
      <rect x="640" width="210" height="40" rx="20" fill="#f472b6"/>
      <text class="font chip" x="668" y="27">PDPA</text>
      <rect x="870" width="250" height="40" rx="20" fill="#a78bfa"/>
      <text class="font chip" x="898" y="27">Academic year</text>
    </g>
  </g>

  <text class="font small" x="96" y="2110">สรุปจากเมนูและหน้าระบบในโปรเจกต์ school-conduct</text>
  <text class="font small" x="1504" y="2110" text-anchor="end">Generated Poster</text>
</svg>
